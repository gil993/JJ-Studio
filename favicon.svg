<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e9b384"/>
      <stop offset="100%" style="stop-color:#c4893d"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>

  <!-- Decorative corner accents -->
  <rect x="6" y="6" width="14" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>
  <rect x="6" y="6" width="3" height="14" rx="1.5" fill="url(#gold)" opacity="0.6"/>
  <rect x="80" y="6" width="14" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>
  <rect x="91" y="6" width="3" height="14" rx="1.5" fill="url(#gold)" opacity="0.6"/>
  <rect x="6" y="91" width="14" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>
  <rect x="6" y="80" width="3" height="14" rx="1.5" fill="url(#gold)" opacity="0.6"/>
  <rect x="80" y="91" width="14" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>
  <rect x="91" y="80" width="3" height="14" rx="1.5" fill="url(#gold)" opacity="0.6"/>

  <!-- J left -->
  <text x="13" y="67" font-family="Georgia, serif" font-size="52" font-weight="700" fill="url(#gold)">J</text>

  <!-- J right (mirrored/offset for dynamic look) -->
  <text x="48" y="67" font-family="Georgia, serif" font-size="52" font-weight="700" fill="white" opacity="0.92">J</text>

  <!-- Underline accent -->
  <rect x="13" y="72" width="74" height="3" rx="1.5" fill="url(#gold)" opacity="0.8"/>

  <!-- Small dot accent -->
  <circle cx="50" cy="83" r="2.5" fill="url(#gold)" opacity="0.7"/>
</svg>
